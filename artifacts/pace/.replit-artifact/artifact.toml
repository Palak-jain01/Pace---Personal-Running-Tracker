kind = "web"
previewPath = "/"
title = "Pace — Personal Running Tracker"
version = "1.0.0"
id = "artifacts/pace"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24828

[services.development]
run = "pnpm --filter @workspace/pace run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pace", "run", "build" ]
serve = "static"
publicDir = "artifacts/pace/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24828"
BASE_PATH = "/"
